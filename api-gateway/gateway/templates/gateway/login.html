{% extends "gateway/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Dang nhap</h1>
                <p class="text-muted">Neu ban muon vao trang admin, hay dung ten dang nhap `admin` va mat khau `admin`.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">{{ form.email.label_tag }}{{ form.email }}</div>
                    <div class="mb-3">{{ form.password.label_tag }}{{ form.password }}</div>
                    <button class="btn btn-dark w-100">Vao he thong</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
